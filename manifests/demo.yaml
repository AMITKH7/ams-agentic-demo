project:
  name: demo-ams
  environment: development
  region: apac
  maturity: advisory

github:
  enabled: false
  org: AMITKH7
  repo: AMITKH7/checkout-service

servicenow:
  instance: https://dev420660.service-now.com
  confidence_threshold: 0.70
  similar_incident_first: true
  system_of_record: true

atlassian:
  enabled: true
  rovo_mcp_url: https://mcp.atlassian.com/v1/mcp
  cloud_id: amitkh.atlassian.net
  jira_project: KAN
  confluence_space: AMSKB

  dynamic_search:
    enabled: true
    max_results: 10
    max_jira_results: 5
    max_confluence_results: 5
    fallback_jira_issue: KAN-1
    query_boost_terms:
      - runbook
      - RCA
      - known error
      - SOP
      - retry
      - timeout

ai_enhance:
  enabled: false
  provider: openai
  model: gpt-5.5
  timeout_ms: 8000
  max_words: 300
  fallback_on_error: true

github_handoff:
  enabled: true
  provider: copilot
  repo: AMITKH7/checkout-service
  human_gate_required: true
  duplicate_protection: true

observability:
  trace_header: x-ams-trace-id

service_map:
  - ci: checkout-service
    github_repo: AMITKH7/checkout-service
    jira_project: KAN
    confluence_space: AMSKB
    owning_team: demo-ams-team